<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wakulima Farm Tools Ltd.</title>
  <style>
    :root{--bg:#f7f7f0;--accent:#2f6f3a;--card:#fff;--muted:#666;--shadow:rgba(33,33,33,0.08)}
    *{box-sizing:border-box}
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--bg);color:#222}
    header{padding:28px 16px;text-align:center;background:linear-gradient(180deg,rgba(47,111,58,0.06),transparent);border-bottom:1px solid rgba(0,0,0,0.04)}
    .logo{width:150px;height:150px;object-fit:contain;border-radius:12px;display:block;margin:0 auto 12px;box-shadow:0 6px 18px var(--shadow);background:var(--card);padding:6px}
    header h1{margin:0;font-size:1.8rem;color:var(--accent)}
    main.content{max-width:900px;margin:18px auto;padding:20px;background:var(--card);border-radius:10px;box-shadow:0 6px 18px var(--shadow)}
    .featured{width:400px;height:250px;max-width:calc(100% - 40px);object-fit:cover;display:block;margin:20px auto;border-radius:8px;box-shadow:0 6px 18px var(--shadow)}
    h2{color:var(--accent);margin-top:0}
    ol,ul{margin-left:1.2rem;line-height:1.65}
    li ul{margin-top:6px;margin-left:0.6rem}
    @media(max-width:600px){.logo{width:120px;height:120px}.featured{width:100%;height:auto}.content{padding:16px}}
  </style>
</head>
